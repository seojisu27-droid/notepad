# Render Blueprint — 무료(free) 플랜. 데이터베이스는 Turso(libSQL) 외부 서비스 사용.
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: notepad
    runtime: node
    plan: free            # 무료 웹 서비스
    region: singapore     # 한국과 가까운 무료 리전 (oregon 으로 바꿔도 됨)
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      # 아래 두 값은 보안상 render.yaml 에 넣지 않고, 배포 시 Render 대시보드에서 입력합니다.
      - key: TURSO_URL
        sync: false
      - key: TURSO_TOKEN
        sync: false
      - key: NODE_VERSION
        value: "20"
