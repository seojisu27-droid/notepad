# Render Blueprint — 모두 무료(free) 플랜으로 설정되어 있습니다.
# https://render.com/docs/blueprint-spec

databases:
  - name: notepad-db
    plan: free            # 무료 PostgreSQL
    databaseName: notepad
    user: notepad

services:
  - type: web
    name: notepad
    runtime: node
    plan: free            # 무료 웹 서비스
    region: singapore     # 한국과 가까운 무료 리전 (oregon 으로 바꿔도 됨)
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: notepad-db
          property: connectionString
      - key: NODE_VERSION
        value: "20"
